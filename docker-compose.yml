services:
  redis:
    image: redis:8
    container_name: ai-firewall-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: ai-firewall-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  firewall:
    image: vcalproject/ai-firewall:v0.1.0
    container_name: ai-firewall
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./configs:/configs:ro
    command: ["--config", "/configs/ai-firewall.conf"]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: ai-firewall-prometheus
    depends_on:
      - firewall
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4.0
    container_name: ai-firewall-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards/ai-cost-firewall-dashboard.json:/etc/grafana/provisioning/dashboards-json/ai-cost-firewall-dashboard.json:ro
      - ./deploy/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_storage:
  grafana_data:
